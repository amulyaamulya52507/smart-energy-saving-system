<!DOCTYPE html>
<html>
<head>
    <title>Smart Energy Saving System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>⚡ Smart Energy Saving System</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Room Status</h2>
        <p id="room">Occupied</p>
    </div>

    <div class="card">
        <h2>Light Status</h2>
        <p id="light">ON</p>
        <button onclick="toggleLight()">Toggle Light</button>
    </div>

    <div class="card">
        <h2>Fan Status</h2>
        <p id="fan">ON</p>
        <button onclick="toggleFan()">Toggle Fan</button>
    </div>

    <div class="card">
        <h2>Energy Saved</h2>
        <p>15 kWh Today</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
